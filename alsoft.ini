## alsoft.ini
## ============================================================
## OpenAL Soft configuration for OpenAL Spatial Audio Renderer
##
## Place this file at:
##   %APPDATA%\alsoft.ini          (per-user, recommended)
##   %ALSOFT_CONF%\alsoft.ini      (env-var override)
##   C:\Windows\System32\alsoft.ini (global – not recommended)
##
## Documentation: https://github.com/kcat/openal-soft/wiki/Configuring-OpenAL-Soft
## ============================================================

[general]
## Output sample rate – must match ISpatialAudioClient format
frequency = 48000

## Stereo/headphones mixing mode
## 'hrtf' = full HRTF per source (best quality, highest CPU)
## 'uhj'  = UHJ ambisonics (good quality, lower CPU)
## 'fuma' = FuMa ambisonics
stereo-mode = hrtf

## Resampler quality
## 'cubic'   = cubic interpolation (good balance)
## 'bsinc12' = band-limited 12-point sinc (high quality)
## 'bsinc24' = band-limited 24-point sinc (best quality)
resampler = bsinc24

## Increase this for more simultaneous sources (our max is 256)
sources = 256

## Disable distance-based panning fallback when HRTF is active
hrtf-gain = 1.0

[hrtf]
## 'true' forces HRTF even on non-headphone outputs
## (overridden per-device via alcResetDeviceSOFT)
hrtf = true

## Which dataset to use (index into enumerated list)
## 0 = OpenAL Soft's built-in MIT KEMAR (44100 Hz version)
## Set to 'auto' to let the library pick the best available
default-hrtf = auto

## Ambisonics order used internally
## Higher = more accurate 3D but more CPU
ambi-format = AmbiX
ambi-order = 3

## HRTF filter type
## 'full'     = full FIR convolution (best, highest CPU)
## 'bsinc12'  = band-limited sinc with 12 points
## 'bsinc24'  = band-limited sinc with 24 points (recommended)
hrtf-mode = bsinc24

[reverb]
## EAX Reverb via EFX – attach to sources with AL_AUXILIARY_SEND_FILTER
## Setting to 'true' enables the EFX extension globally
engine = eaxreverb

[doppler]
## Enable Doppler effect for moving sources
factor = 1.0
velocity = 343.3

[decoder]
## Headphone compensation
hq-mode = true

## Virtual speaker layout used before HRTF encoding
## 'cube'      = 8-point cube layout
## '3d7.1'     = 3D 7.1 layout (recommended)
quad-filter-hf = true

[output]
## WASAPI exclusive mode gives lowest latency
## OpenAL Soft uses shared mode by default; exclusive via
## the Windows Audio Session device enumeration
## Set WASAPI-exclusive via the device string if needed
#backend = WASAPI

## Buffer period (milliseconds) – 10 ms = 480 frames @ 48 kHz
period-size = 480
periods = 4
